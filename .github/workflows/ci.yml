name: CI Pipeline - Juliana

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Ejecutar pruebas
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Instalar dependencias
        run: npm install || echo "No hay dependencias"

      - name: Ejecutar pruebas
        run: npm test || echo "No hay tests configurados"

      - name: Verificar sintaxis del código (opcional)
        run: |
          if [ -f src/app.js ]; then
            node --check src/app.js
          else
            echo "Archivo src/app.js no encontrado, se omite verificación"
          fi